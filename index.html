<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  @property --border-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @property --mesh-spin { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --crimson: #DC143C;
    --oxblood: #0f0000;
    --gold: #FFD700;
    --cadmium: #E69F00;
    --royal: #002366;
    --ultramarine: #0a0044;
    --tyrian: #2a0138;
    --void: #030104;
    --milk: #f0ede8;
    --mx: 50%;
    --my: 50%;
    --lx: 0;
    --ly: 0;
  }
  body {
    font-family: 'Fira Code', 'OCR-A', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--void);
    overflow: hidden;
    position: relative;
    cursor: none;
  }

  /* === COSMIC BACKGROUND === */
  .cosmos {
    position: fixed;
    inset: -20%;
    width: 140%;
    height: 140%;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, var(--oxblood) 0%, var(--void) 60%);
  }
  .nebula {
    position: absolute;
    filter: blur(140px);
    mix-blend-mode: screen;
    pointer-events: none;
    will-change: transform, border-radius;
    opacity: 0.5;
  }
  .nebula-crimson {
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, var(--crimson) 0%, transparent 70%);
    top: -15%; left: -20%;
    animation: blob-1 20s ease-in-out infinite alternate;
  }
  .nebula-royal {
    width: 55vw; height: 55vw;
    background: radial-gradient(circle, var(--royal) 0%, var(--ultramarine) 50%, transparent 70%);
    bottom: -25%; right: -15%;
    animation: blob-2 24s ease-in-out infinite alternate;
    mix-blend-mode: color-dodge;
    opacity: 0.4;
  }
  .nebula-gold {
    width: 40vw; height: 40vw;
    background: radial-gradient(circle, var(--gold) 0%, var(--cadmium) 40%, transparent 65%);
    top: 35%; left: 25%;
    animation: blob-3 18s ease-in-out infinite alternate;
    mix-blend-mode: overlay;
    opacity: 0.35;
  }
  .nebula-tyrian {
    width: 35vw; height: 35vw;
    background: radial-gradient(circle, var(--tyrian) 0%, transparent 65%);
    top: 5%; right: 20%;
    animation: blob-4 28s ease-in-out infinite alternate;
    opacity: 0.45;
  }
  .nebula-oxblood {
    width: 90vw; height: 90vw;
    background: radial-gradient(circle, var(--oxblood) 0%, transparent 55%);
    top: 0%; left: 0%;
    animation: breathe 30s ease-in-out infinite;
    mix-blend-mode: multiply;
    opacity: 0.85;
    filter: blur(160px);
  }
  @keyframes blob-1 {
    0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(0,0) scale(1); }
    50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; transform: translate(40px,-30px) scale(1.1); }
    100% { border-radius: 50% 50% 40% 60% / 40% 50% 60% 50%; transform: translate(-20px,20px) scale(0.95); }
  }
  @keyframes blob-2 {
    0% { border-radius: 40% 60% 60% 40% / 60% 40% 60% 40%; transform: translate(0,0) scale(1); }
    50% { border-radius: 60% 40% 30% 70% / 40% 60% 40% 60%; transform: translate(-50px,-40px) scale(1.15); }
    100% { border-radius: 30% 70% 50% 50% / 50% 40% 70% 50%; transform: translate(30px,-60px) scale(1.05); }
  }
  @keyframes blob-3 {
    0% { border-radius: 50% 50% 40% 60% / 40% 50% 60% 50%; transform: translate(0,0) scale(1) rotate(0deg); }
    50% { border-radius: 60% 40% 60% 40% / 60% 40% 60% 40%; transform: translate(-60px,40px) scale(1.2) rotate(45deg); }
    100% { border-radius: 40% 60% 50% 50% / 50% 60% 40% 60%; transform: translate(20px,-20px) scale(1.1) rotate(-30deg); }
  }
  @keyframes blob-4 {
    0% { border-radius: 70% 30% 50% 50% / 30% 50% 50% 70%; transform: translate(0,0); }
    100% { border-radius: 30% 70% 60% 40% / 60% 40% 70% 40%; transform: translate(-40px,-50px); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.12); opacity: 0.95; }
  }

  /* === TUNNEL MESH === */
  .mesh-tunnel {
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    z-index: 1;
    pointer-events: none;
    background: conic-gradient(from var(--mesh-spin) at 50% 50%, rgba(220,20,60,0.12) 0deg, rgba(0,35,102,0.12) 90deg, rgba(255,215,0,0.08) 180deg, rgba(42,1,56,0.12) 270deg, rgba(220,20,60,0.12) 360deg);
    animation: tunnel-rotate 20s linear infinite;
    filter: blur(100px) saturate(1.5);
    mix-blend-mode: hard-light;
    opacity: 0.7;
  }
  @keyframes tunnel-rotate { to { --mesh-spin: 360deg; } }

  /* === LATTICE === */
  .lattice {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background-image: linear-gradient(rgba(255,215,0,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,215,0,0.035) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0;
    transition: opacity 0.8s ease;
    mask-image: radial-gradient(circle at var(--mx) var(--my), black 0%, transparent 50%);
    -webkit-mask-image: radial-gradient(circle at var(--mx) var(--my), black 0%, transparent 50%);
  }
  body.lattice-active .lattice { opacity: 1; }

  /* === CHROMATIC FIELD === */
  .chromatic-r, .chromatic-b {
    position: fixed;
    inset: -10px;
    pointer-events: none;
    z-index: 25;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  body:hover .chromatic-r, body:hover .chromatic-b { opacity: 0.12; }
  .chromatic-r {
    background: radial-gradient(circle at var(--mx) var(--my), rgba(220,20,60,0.5) 0%, transparent 50%);
    filter: blur(40px);
    transform: translate(calc(var(--lx) * -4px), calc(var(--ly) * -4px));
  }
  .chromatic-b {
    background: radial-gradient(circle at var(--mx) var(--my), rgba(0,35,102,0.6) 0%, transparent 50%);
    filter: blur(40px);
    transform: translate(calc(var(--lx) * 4px), calc(var(--ly) * 4px));
  }

  /* === FILM GRAIN === */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  /* === VIGNETTE === */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(3,1,4,0.9) 100%);
    box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
  }

  /* === CANVAS === */
  .dimensional-canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 15;
  }

  /* === CURSOR === */
  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--milk);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s, border-color 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.active { width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-color: var(--gold); }
  .cursor-dot {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 101;
    transform: translate(-50%, -50%);
  }

  /* === CONTENT === */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
    perspective: 2000px;
    transform-style: preserve-3d;
 transition: transform 0.4s ease-out;
  }

  /* === GLASS STAGE === */
  .glass-stage {
    position: absolute;
    inset: -60px -80px -40px;
    background: rgba(3, 1, 4, 0.25);
    backdrop-filter: blur(60px) saturate(1.4);
    -webkit-backdrop-filter: blur(60px) saturate(1.4);
    border-radius: 60px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 60px 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.3);
    z-index: -1;
    transform: translateZ(-50px);
    pointer-events: none;
  }

  /* === TITLE === */
  h1 {
    font-family: 'Futura', 'Trebuchet MS', 'Arial Black', 'Bauhaus 93', sans-serif;
    font-weight: 900;
    font-size: clamp(4.5rem, 14vw, 11rem);
    color: var(--milk);
    line-height: 0.9;
    margin-bottom: 4rem;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    text-shadow: 0 0 0 var(--gold), 2px 2px 0 rgba(230,159,0,0.4), 4px 4px 0 rgba(220,20,60,0.25), 8px 8px 0 rgba(0,35,102,0.2), 0 0 40px rgba(220,20,60,0.15), 0 0 80px rgba(0,35,102,0.1), 0 20px 60px rgba(0,0,0,0.6);
    position: relative;
    animation: title-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards, title-breathe 8s ease-in-out infinite 1.5s;
    opacity: 0;
    transform-style: preserve-3d;
  }
  @keyframes title-enter {
    0% { opacity: 0; transform: translateZ(-200px) scale(0.8) rotateX(15deg); filter: blur(30px); }
    100% { opacity: 1; transform: translateZ(0) scale(1) rotateX(0deg); filter: blur(0); }
  }
  @keyframes title-breathe {
    0%, 100% { text-shadow: 0 0 0 var(--gold), 2px 2px 0 rgba(230,159,0,0.4), 4px 4px 0 rgba(220,20,60,0.25), 8px 8px 0 rgba(0,35,102,0.2), 0 0 40px rgba(220,20,60,0.15), 0 0 80px rgba(0,35,102,0.1), 0 20px 60px rgba(0,0,0,0.6); }
    50% { text-shadow: 0 0 0 var(--gold), 3px 3px 0 rgba(230,159,0,0.5), 6px 6px 0 rgba(220,20,60,0.35), 12px 12px 0 rgba(0,35,102,0.25), 0 0 60px rgba(220,20,60,0.2), 0 0 120px rgba(0,35,102,0.15), 0 30px 80px rgba(0,0,0,0.7); }
  }

  /* === LINKS === */
  .links {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    align-items: center;
    position: relative;
    transform-style: preserve-3d;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'Fira Code', 'OCR-A', 'Courier New', monospace;
    font-size: 1.35rem;
    font-weight: 400;
    text-decoration: none;
    color: var(--milk);
    padding: 0.85rem 2.8rem;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.45);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255, 215, 0, 0.15);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: -0.01em;
    cursor: none;
  }
  a::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50px;
    background: conic-gradient(from var(--border-angle, 0deg), var(--gold), var(--crimson), var(--royal), var(--gold));
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
    filter: blur(4px);
  }
  a::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.85);
    z-index: -1;
  }
  a svg, a i { width: 1.1em; height: 1.1em; flex-shrink: 0; font-size: 1.1em; line-height: 1; transition: transform 0.3s ease; }

  a:nth-child(1) { transform: rotate(-2.2deg); }
  a:nth-child(2) { transform: rotate(1.5deg); }
  a:nth-child(3) { transform: rotate(-1.1deg); }
  a:nth-child(4) { transform: rotate(1.8deg); }
  a:nth-child(5) { transform: rotate(-0.6deg); }
  a:nth-child(6) { transform: rotate(0.9deg); }

  a:hover {
    transform: scale(1.07) rotate(0deg);
    border-color: transparent;
    box-shadow: 0 8px 40px rgba(220,20, 60, 0.15), 0 12px 50px rgba(0, 35, 102, 0.1), 0 0 30px rgba(255, 215, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.1);
    color: #fff;
    letter-spacing: 0.05em;
  }
  a:hover::before { opacity: 1; animation: spin-conic 3s linear infinite; }
  a:hover svg, a:hover i { transform: scale(1.2); filter: drop-shadow(0 0 8px rgba(255,215,0,0.4)); }
  @keyframes spin-conic { to { --border-angle: 360deg; } }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    h1 { font-size: clamp(3.5rem, 14vw, 6rem); margin-bottom: 2.8rem; }
    a { font-size: 1.15rem; padding: 0.75rem 2.2rem; }
 .glass-stage { inset: -30px -20px -20px; border-radius: 30px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>

  <script>
    const content = document.getElementById('content');
    const cursor = document.getElementById('cursor');
    const cursorDot = document.getElementById('cursor-dot');
    const links = document.querySelectorAll('a[data-magnetic]');
    let mx = 0.5, my = 0.5, lx = 0, ly = 0, targetX = 0, targetY = 0, dotX = 0, dotY = 0;

    // === 3D TILT + VARIABLES ===
    document.addEventListener('mousemove', (e) => {
      const w = window.innerWidth, h = window.innerHeight;
      mx = e.clientX / w;
      my = e.clientY / h;
      lx = (e.clientX / w - 0.5) * 2;
      ly = (e.clientY / h - 0.5) * 2;
      targetX = e.clientX;
      targetY = e.clientY;
      document.body.style.setProperty('--mx', e.clientX + 'px');
      document.body.style.setProperty('--my', e.clientY + 'px');
      document.body.style.setProperty('--lx', lx);
      document.body.style.setProperty('--ly', ly);
      content.style.transform = `rotateY(${lx * 10}deg) rotateX(${-ly * 10}deg)`;
    });

    // === SMOOTH CURSOR ===
    function animateCursor() {
      dotX += (targetX - dotX) * 0.2;
      dotY += (targetY - dotY) * 0.2;
      cursor.style.left = targetX + 'px';
      cursor.style.top = targetY + 'px';
      cursorDot.style.left = dotX + 'px';
      cursorDot.style.top = dotY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // === MAGNETIC LINKS ===
    links.forEach(link => {
      link.addEventListener('mousemove', (e) => {
        const rect = link.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        link.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px) scale(1.07) rotate(0deg)`;
        cursor.classList.add('active');
      });
      link.addEventListener('mouseleave', () => {
        link.style.transform = '';
        cursor.classList.remove('active');
      });
    });

    // === FAST-MOUSE LATTICE ===
    let lastX = 0, lastY = 0, lastTime = Date.now();
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      const dt = now - lastTime;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const speed = Math.sqrt(dx*dx + dy*dy) / (dt || 1);
      lastX = e.clientX; lastY = e.clientY; lastTime = now;
      if (speed > 2.5) {
        document.body.classList.add('lattice-active');
        clearTimeout(window._latTimer);
        window._latTimer = setTimeout(() => document.body.classList.remove('lattice-active'), 400);
      }
    });

    // === CANVAS EXPLOSION SYSTEM ===
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.008;
        this.color = color;
        this.size = Math.random() * 3 + 1;
        this.gravity = 0.05;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.life -= this.decay;
      }
      draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

 const colors = ['#FFD700', '#DC143C', '#002366', '#E69F00', '#f0ede8', '#2a0138'];

    document.addEventListener('click', (e) => {
      for (let i = 0; i < 60; i++) {
        particles.push(new Particle(e.clientX, e.clientY, colors[Math.floor(Math.random() * colors.length)]));
      }
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

</body>
</html>
