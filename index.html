<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fira Code', 'Courier New', monospace;
    background: #ffffff;
    color: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ===== STACK CONTAINER ===== */
  .stack {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ===== LOGO ===== */
  .logo {
    width: 100%;
  }

  .logo img {
    width: 100%;
    height: auto;
    display: block;
    border: 1.5px solid #000000;
    border-radius: 4px;
  }

  /* ===== YOUTUBE ===== */
  .youtube-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    border: 1.5px solid #000000;
    border-radius: 4px;
    overflow: hidden;
    background: #000000;
  }

  .youtube-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ===== LINKS ===== */
  .links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Fira Code', 'Courier New', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    color: #000000;
    padding: 0.55rem 1.1rem;
    border: 1.5px solid #000000;
    border-radius: 4px;
    background: #ffffff;
    transition: background 0.2s ease, color 0.2s ease;
  }

  a:hover {
    background: #000000;
    color: #ffffff;
  }

  a svg, a i {
    width: 1em;
    height: 1em;
    font-size: 1em;
    line-height: 1;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    body { padding: 20px 16px; }
    .stack { gap: 1.5rem; }
  }
</style>
