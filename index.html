<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Caveat', cursive;
    background-color: #0a0a0f;
    color: #e85d04;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(232, 93, 4, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(72, 202, 228, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #0a0a0f 0%, #0a0a0f 100%);
    animation: drift 20s ease-in-out infinite;
    z-index: -2;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-2%, 3%) scale(1.05); }
    66% { transform: translate(3%, -2%) scale(0.95); }
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: -1;
    animation: float 15s infinite ease-in-out;
  }

  .blob-1 {
    width: 400px;
    height: 400px;
    background: #e85d04;
    top: 10%;
    left: 20%;
    animation-delay: 0s;
  }

  .blob-2 {
    width: 300px;
    height: 300px;
    background: #48cae4;
    bottom: 20%;
    right: 15%;
    animation-delay: -5s;
  }

  .blob-3 {
    width: 250px;
    height: 250px;
    background: #e85d04;
    top: 50%;
    left: 60%;
    opacity: 0.2;
    animation-delay: -10s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(20px, -30px); }
    50% { transform: translate(-20px, 20px); }
    75% { transform: translate(30px, 10px); }
  }

  .container {
    text-align: center;
    padding: 3.5rem 2.5rem;
    position: relative;
    z-index: 1;
    max-width: 600px;
    width: 90%;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 50px;
    border: 1px solid rgba(72, 202, 228, 0.15);
    box-shadow: 
      0 8px 32px 0 rgba(0, 0, 0, 0.37),
      inset 0 0 20px rgba(232, 93, 4, 0.05);
    transition: all 0.4s ease;
  }

  .container:hover {
    backdrop-filter: blur(25px) saturate(1.2);
    border-color: rgba(72, 202, 228, 0.3);
    box-shadow: 
      0 8px 40px 0 rgba(232, 93, 4, 0.15),
      inset 0 0 30px rgba(232, 93, 4, 0.08);
  }

  h1 {
    font-size: 5rem;
    margin-bottom: 0.5rem;
    color: #e85d04;
    text-shadow: 
      2px 2px 0px #0a0a0f,
      4px 4px 0px rgba(72, 202, 228, 0.25),
      0 0 50px rgba(232, 93, 4, 0.4);
    letter-spacing: 2px;
    line-height: 1;
    transform: perspective(500px) rotateY(-3deg);
  }

  .subtitle {
    font-size: 1.6rem;
    color: #48cae4;
    margin-bottom: 3rem;
    opacity: 0.85;
    font-style: italic;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: center;
  }

  a {
    display: inline-block;
    font-size: 1.9rem;
    text-decoration: none;
    color: #e85d04;
    padding: 0.6rem 2.5rem;
    border-radius: 50px;
    background: rgba(10, 10, 15, 0.4);
    border: 1px solid rgba(232, 93, 4, 0.2);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    width: fit-content;
    text-shadow: 
      1px 1px 0px rgba(72, 202, 228, 0.4),
      -1px -1px 0px rgba(232, 93, 4, 0.2);
  }

  a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(72, 202, 228, 0.25), transparent);
    transition: left 0.5s ease;
  }

  a:hover {
    color: #0a0a0f;
    background: #e85d04;
    border-color: #e85d04;
    transform: translateY(-3px) scale(1.05);
    text-shadow: none;
    box-shadow: 0 10px 25px rgba(232, 93, 4, 0.3);
  }

  a:hover::before {
    left: 100%;
  }

  @media (max-width: 480px) {
    h1 { font-size: 3.5rem; }
    a { font-size: 1.5rem; }
    .container { border-radius: 35px; padding: 2.5rem 1.5rem; }
  }
</style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <h1>Fool of Schtick</h1>
    <p class="subtitle">a working system, not a duplicity within a fallacy</p>
    
    <div class="links">
      <a href="https://x.com/foolofschtick" target="_blank">X.com</a>
      <a href="https://www.instagram.com/foolofschtick?igsh=MzRlODBiNWFlZA==" target="_blank">Instagram</a>
      <a href="https://www.tiktok.com/@foolofschtick?_r=1&_t=ZT-96t2iCgbA7y" target="_blank">TikTok</a>
      <a href="https://www.facebook.com/61590695035991/" target="_blank">Facebook</a>
      <a href="mailto:contact@foolofschtick.com">Email</a>
    </div>
  </div>

</body>
</html>
