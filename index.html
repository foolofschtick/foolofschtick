<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Fira+Code:wght@400;700&family=Tangerine:wght@400;700&family=Jost:wght@300;700;900&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: #050208;
    color: #f0e6ff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    perspective: 1200px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    z-index: 1000;
    pointer-events: none;
    opacity: 0.4;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 35%, #050208 90%);
    z-index: 5;
    pointer-events: none;
  }

  .background {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
    pointer-events: none;
    animation: breathe ease-in-out infinite;
  }

  .orb-crimson {
    width: 75vw; height: 75vw;
    background: radial-gradient(circle at 40% 40%, #800020 0%, #2a0008 80%);
    top: -25vw; left: -20vw;
    opacity: 0.55;
    filter: blur(120px);
    animation-duration: 20s;
  }

  .orb-purple {
    width: 65vw; height: 65vw;
    background: radial-gradient(circle at 60% 50%, #66023C 0%, #1a0020 80%);
    bottom: -20vw; right: -25vw;
    opacity: 0.6;
    filter: blur(140px);
    animation-duration: 26s;
    animation-delay: -5s;
  }

  .orb-gold {
    width: 45vw; height: 45vw;
    background: radial-gradient(circle at 50% 60%, #E49B0F 0%, #5c3a00 80%);
    bottom: -15vw; left: 25%;
    opacity: 0.45;
    filter: blur(100px);
    animation-duration: 18s;
    animation-delay: -9s;
    mix-blend-mode: overlay;
  }

  .orb-blue {
    width: 55vw; height: 55vw;
    background: radial-gradient(circle at 30% 30%, #3F00FF 0%, #000033 80%);
    top: 15%; right: -10vw;
    opacity: 0.5;
    filter: blur(130px);
    animation-duration: 30s;
    animation-delay: -15s;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.5; }
    33% { transform: scale(1.12) translate(30px, -40px); opacity: 0.7; }
    66% { transform: scale(0.95) translate(-20px, 25px); opacity: 0.45; }
  }

  .geometry {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    pointer-events: none;
    perspective: 1000px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(228, 155, 15, 0.12);
    box-shadow: 0 0 40px rgba(102, 2, 60, 0.08), inset 0 0 40px rgba(63, 0, 255, 0.05);
  }

  .ring1 { width: 85vh; height: 85vh; animation: spin 50s linear infinite; }
  .ring2 { width: 100vh; height: 100vh; animation: spin 70s linear infinite reverse; border-color: rgba(128, 0, 32, 0.10); }
  .ring3 { width: 115vh; height: 115vh; animation: spin 90s linear infinite; border-color: rgba(63, 0, 255, 0.07); border-style: dashed; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .scanline {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(228, 155, 15, 0.5) 50%, transparent 100%);
    box-shadow: 0 0 20px rgba(228, 155, 15, 0.3);
    animation: scan 10s linear infinite;
    z-index: 50;
    pointer-events: none;
    opacity: 0.7;
  }

  @keyframes scan {
    0% { top: -5%; opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { top: 105%; opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
    max-width: 1000px;
    margin: 0 auto;
    gap: 4rem;
  }

  .title {
    text-align: center;
    line-height: 0.9;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: titleFloat 6s ease-in-out infinite;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .title .fool, .title .schtick {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(5.5rem, 15vw, 12rem);
    background: linear-gradient(135deg, #FFD700 0%, #E49B0F 20%, #800020 45%, #66023C 70%, #3F00FF 100%);
    background-size: 250% 250%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 25px rgba(102, 2, 60, 0.6)) drop-shadow(0 0 70px rgba(128, 0, 32, 0.4));
    animation: gradientShift 10s ease infinite;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .title .of {
    font-family: 'Tangerine', cursive;
    font-size: clamp(3.5rem, 9vw, 7rem);
    color: #E49B0F;
    margin: -0.25em 0;
    z-index: 2;
    transform: rotate(-6deg) translateX(15px);
    text-shadow: 0 0 50px rgba(228, 155, 15, 0.7), 0 4px 30px rgba(0,0,0,0.9);
    font-weight: 700;
    line-height: 1;
    pointer-events: none;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .links a {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    text-decoration: none;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    padding: 0.85rem 1.8rem;
    background: rgba(5, 2, 8, 0.35);
    backdrop-filter: blur(12px) saturate(1.2);
    -webkit-backdrop-filter: blur(12px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .links a::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.03) 50%, transparent 80%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .links a:hover::before {
    transform: translateX(100%);
  }

  a.x-link {
    font-family: 'Fira Code', monospace;
    font-size: 1.15rem;
    color: #a5b3cc;
    border-left: 3px solid #3F00FF;
    letter-spacing: 0.08em;
  }
  a.x-link:hover {
    color: #e0e6ff;
    background: rgba(63, 0, 255, 0.08);
    border-color: #5c3aff;
    box-shadow: 0 0 30px rgba(63, 0, 255, 0.2), inset 0 0 20px rgba(63, 0, 255, 0.05);
    transform: translateX(8px) scale(1.02);
  }

  a.ig-link {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.45rem;
    color: #f0d0ff;
    border-bottom: 1px solid rgba(228, 155, 15, 0.25);
    border-radius: 4px 24px 4px 24px;
  }
  a.ig-link:hover {
    color: #fff;
    background: rgba(102, 2, 60, 0.15);
    border-color: #E49B0F;
    box-shadow: 0 8px 40px rgba(102, 2, 60, 0.25);
    transform: translateY(-3px) scale(1.03);
    letter-spacing: 0.04em;
  }

  a.tt-link {
    font-family: 'Jost', sans-serif;
    font-weight: 900;
    font-size: 1.35rem;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid rgba(255,255,255,0.1);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }
  a.tt-link:hover {
    color: #00f2ea;
    text-shadow: 2px 0 #ff0050, -2px 0 #00f2ea;
    background: rgba(0, 242, 234, 0.05);
    transform: scale(1.04) rotate(-0.5deg);
  }

  a.fb-link {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 1.55rem;
    color: #e8e0ff;
    border-top: 2px solid #800020;
    border-radius: 0;
    letter-spacing: 0.02em;
  }
  a.fb-link:hover {
    color: #fff;
    background: rgba(128, 0, 32, 0.12);
    box-shadow: 0 0 40px rgba(128, 0, 32, 0.3);
    border-color: #ff1a53;
    transform: translateX(-6px) scale(1.02);
  }

  a.yt-link {
    font-family: 'Jost', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: #ffd6d6;
    border-right: 4px solid #66023C;
    letter-spacing: 0.06em;
  }
  a.yt-link:hover {
    color: #fff;
    background: rgba(102, 2, 60, 0.15);
    border-color: #ff0044;
    box-shadow: 0 0 35px rgba(102, 2, 60, 0.35);
    transform: translateX(6px) scale(1.02);
  }

  a.em-link {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 1.05rem;
    color: #a090b0;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(5, 2, 8, 0.2);
    justify-content: center;
    padding: 1rem;
  }
  a.em-link:hover {
    color: #E49B0F;
    border-color: rgba(228, 155, 15, 0.3);
    background: rgba(228, 155, 15, 0.05);
    letter-spacing: 0.25em;
    transform: scale(1.01);
  }

  .links a svg, .links a i {
    width: 1.3em;
    height: 1.3em;
    flex-shrink: 0;
    opacity: 0.85;
    transition: all 0.4s ease;
  }
  .links a:hover svg, .links a:hover i {
    opacity: 1;
    transform: scale(1.15) rotate(-5deg);
    filter: drop-shadow(0 0 8px currentColor);
  }

  .cursor-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(63, 0, 255, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: left 0.1s ease, top 0.1s ease;
    mix-blend-mode: screen;
  }

  @media (max-width: 600px) {
    .content { gap: 2.5rem; padding: 2rem 1rem; }
    .title .fool, .title .schtick { font-size: clamp(4rem, 18vw, 7rem); }
    .title .of { font-size: clamp(2.5rem, 10vw, 4rem); }
    .links a { padding: 0.75rem 1.2rem; }
    .ring1, .ring2, .ring3 { display: none; }
  }
</style>
</head>

    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>
