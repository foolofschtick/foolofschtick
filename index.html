<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --void: #0a0a0f;
    --concrete: #844A9C;
  }

  body {
    font-family: 'Fira Code', 'Courier New', monospace;
    background: var(--void);
    color: var(--concrete);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px;
  }

  .stack {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Concrete geometric frame module */
  .geo-frame {
    position: relative;
    border: 3px solid var(--concrete);
    padding: 16px;
    background: var(--void);
  }

  .geo-frame::before {
    content: '';
    position: absolute;
    top:8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border: 1px solid var(--concrete);
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border: 3px solid var(--concrete);
    pointer-events: none;
  }
  .corner-tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .corner-tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
  .corner-bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
  .corner-br { bottom: -3px; right: -3px; border-left: none; border-top: none; }

  .logo {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .logo img {
    max-height: 22vh;
    width: auto;
    height: auto;
    display: block;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    border: 3px solid var(--concrete);
    background: var(--void);
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* Heavy geometric divider */
  .divider {
    width: 100%;
    height: 24px;
    position: relative;
    border-top: 3px solid var(--concrete);
    border-bottom: 3px solid var(--concrete);
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    background: var(--concrete);
  }

  .links {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 4px;
  }

  a {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Fira Code', 'Courier New', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--concrete);
    padding: 16px 20px;
    border: 3px solid var(--concrete);
    background: var(--void);
    position: relative;
  }

  a svg, a i {
    width: 1.1em;
    height: 1.1em;
    font-size: 1.1em;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Concrete slab numbering for geometric rigidity */
  a .index {
    font-weight: 700;
    margin-right: 4px;
    min-width: 24px;
    text-align: center;
    border-right: 3px solid var(--concrete);
    padding-right: 12px;
  }

  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    .stack { gap: 24px; }
    .geo-frame { padding: 12px; }
    a { padding: 14px 16px; }
  }
</style>
