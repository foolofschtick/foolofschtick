<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  @property --border-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crimson: #DC143C;
    --oxblood: #0f0000;
    --gold: #FFD700;
    --cadmium: #E69F00;
    --royal: #002366;
    --ultramarine: #0a0044;
    --tyrian: #2a0138;
    --void: #030104;
    --mx: 0.5;
    --my: 0.5;
  }

  body {
    font-family: 'Fira Code', 'OCR A', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--void);
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }

  /* === DIMENSIONAL BACKGROUND FIELD === */
  .warp-field {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, var(--oxblood) 0%, var(--void) 50%);
  }

  .plasma {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    mix-blend-mode: screen;
    pointer-events: none;
    will-change: transform;
    opacity: 0.55;
  }

  .plasma-crimson {
    width: 55vw; height: 55vw;
    background: radial-gradient(circle, var(--crimson) 0%, transparent 65%);
    top: -10%; left: -15%;
    animation: lissajous-1 28s ease-in-out infinite;
  }

  .plasma-royal {
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, var(--royal) 0%, var(--ultramarine) 40%, transparent 65%);
    bottom: -20%; right: -10%;
    animation: lissajous-2 32s ease-in-out infinite reverse;
    mix-blend-mode: color-dodge;
    opacity: 0.45;
  }

  .plasma-gold {
    width: 35vw; height: 35vw;
    background: radial-gradient(circle, var(--gold) 0%, var(--cadmium) 30%, transparent 60%);
    top: 40%; left: 20%;
    animation: lissajous-3 24s ease-in-out infinite;
    mix-blend-mode: overlay;
    opacity: 0.35;
  }

  .plasma-oxblood {
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, var(--oxblood) 0%, transparent 55%);
    top: 10%; left: 30%;
    animation: breathe-slow 40s ease-in-out infinite;
    mix-blend-mode: multiply;
    opacity: 0.8;
    filter: blur(120px);
  }

  .plasma-tyrian {
    width: 30vw; height: 30vw;
    background: radial-gradient(circle, var(--tyrian) 0%, transparent 60%);
    top: 10%; right: 25%;
    animation: drift-slow 35s ease-in-out infinite reverse;
    mix-blend-mode: multiply;
    opacity: 0.4;
    filter: blur(90px);
  }

  /* Mesh bleed layer */
  .mesh-bleed {
    position: absolute;
    inset: 0;
    background: conic-gradient(from 0deg at 40% 60%, rgba(220,20,60,0.15), rgba(0,35,102,0.15), rgba(255,215,0,0.08), rgba(0,35,102,0.15), rgba(220,20,60,0.15));
    animation: mesh-rotate 25s linear infinite;
    filter: blur(80px);
    mix-blend-mode: overlay;
    opacity: 0.6;
    transform-origin: center;
  }

  @keyframes mesh-rotate {
    to { transform: rotate(360deg); }
  }

  @keyframes lissajous-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(60px, -40px) scale(1.1); }
    50% { transform: translate(-30px, 50px) scale(0.95); }
    75% { transform: translate(40px, 30px) scale(1.05); }
  }

  @keyframes lissajous-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-50px, -30px) scale(1.08); }
    66% { transform: translate(30px, -50px) scale(0.92); }
  }

  @keyframes lissajous-3 {
    0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    50% { transform: translate(-40px, 40px) scale(1.12) rotate(180deg); }
  }

  @keyframes breathe-slow {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 0.9; }
  }

  @keyframes drift-slow {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-60px, -40px); }
  }

  /* === FILM GRAIN === */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  /* === VIGNETTE === */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    box-shadow: inset 0 0 250px rgba(0,0,0,0.85), inset 0 0 60px rgba(15,0,0,0.6);
  }

  /* === HIDDEN LATTICE === */
  .lattice {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background-image: 
      linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  body.lattice-active .lattice {
    opacity: 1;
  }

  /* === CHROMATIC MOUSE ABERRATION === */
  .chromatic {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 30;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  body:hover .chromatic {
    opacity: 0.12;
  }
  .chromatic-r, .chromatic-b {
    position: absolute;
    inset: -4px;
    background: radial-gradient(circle at calc(var(--mx) * 100%) calc(var(--my) * 100%), rgba(220,20,60,0.3) 0%, transparent 50%);
    mix-blend-mode: screen;
  }
  .chromatic-r {
    filter: blur(6px);
    transform: translate(-4px, -2px);
  }
  .chromatic-b {
    filter: blur(6px);
    transform: translate(4px, 2px);
  }

  /* === CONTENT === */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
    width: 100%;
    perspective: 1200px;
    transform-style: preserve-3d;
    transition: transform 0.3s ease-out;
  }

  /* === TITLE === */
  h1 {
    font-family: 'Futura', 'Trebuchet MS', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: clamp(4.5rem, 14vw, 11rem);
    color: #f0ede8;
    line-height: 0.9;
    margin-bottom: 4rem;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    text-shadow:
      0 0 0 var(--gold),
      2px 2px 0 rgba(230,159,0,0.4),
      4px 4px 0 rgba(220,20,60,0.25),
      8px 8px 0 rgba(0,35,102,0.2),
      0 0 40px rgba(220,20,60,0.15),
      0 0 80px rgba(0,35,102,0.1),
      0 20px 60px rgba(0,0,0,0.6);
    position: relative;
    animation: title-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards,
               title-breathe 10s ease-in-out infinite 1.5s;
    opacity: 0;
    transform-style: preserve-3d;
  }

  @keyframes title-enter {
    0% {
      opacity: 0;
      transform: translateZ(-100px) scale(0.8);
      filter: blur(20px);
    }
    100% {
      opacity: 1;
      transform: translateZ(0) scale(1);
      filter: blur(0);
    }
  }

  @keyframes title-breathe {
    0%, 100% { 
      text-shadow:
        0 0 0 var(--gold),
        2px 2px 0 rgba(230,159,0,0.4),
        4px 4px 0 rgba(220,20,60,0.25),
        8px 8px 0 rgba(0,35,102,0.2),
        0 0 40px rgba(220,20,60,0.15),
        0 0 80px rgba(0,35,102,0.1),
        0 20px 60px rgba(0,0,0,0.6);
    }
    50% {
      text-shadow:
        0 0 0 var(--gold),
        3px 3px 0 rgba(230,159,0,0.5),
        6px 6px 0 rgba(220,20,60,0.35),
        12px 12px 0 rgba(0,35,102,0.25),
        0 0 60px rgba(220,20,60,0.2),
        0 0 120px rgba(0,35,102,0.15),
        0 30px 80px rgba(0,0,0,0.7);
    }
  }

  /* === LINKS === */
  .links {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    align-items: center;
    position: relative;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'Fira Code', 'OCR A', 'Courier New', monospace;
    font-size: 1.35rem;
    font-weight: 400;
    text-decoration: none;
    color: #f0ede8;
    padding: 0.85rem 2.8rem;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.45);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255, 215, 0, 0.15);
    box-shadow: 
      0 4px 24px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: -0.01em;
  }

  a::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50px;
    background: conic-gradient(from var(--border-angle, 0deg), var(--gold), var(--crimson), var(--royal), var(--gold));
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
    filter: blur(4px);
  }

  a::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.85);
    z-index: -1;
  }

  a svg, a i {
    width: 1.1em;
    height: 1.1em;
    flex-shrink: 0;
    font-size: 1.1em;
    line-height: 1;
    transition: transform 0.3s ease;
  }

  /* Retained rotations from original, slightly more extreme */
  a:nth-child(1) { transform: rotate(-2.2deg); }
  a:nth-child(2) { transform: rotate(1.5deg); }
  a:nth-child(3) { transform: rotate(-1.1deg); }
  a:nth-child(4) { transform: rotate(1.8deg); }
  a:nth-child(5) { transform: rotate(-0.6deg); }
  a:nth-child(6) { transform: rotate(0.9deg); }

  a:hover {
    transform: scale(1.07) rotate(0deg);
    border-color: transparent;
    box-shadow: 
      0 8px 40px rgba(220, 20, 60, 0.15),
      0 12px 50px rgba(0, 35, 102, 0.1),
      0 0 30px rgba(255, 215, 0, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.1);
    color: #fff;
    letter-spacing: 0.05em;
  }

  a:hover::before {
    opacity: 1;
    animation: spin-conic 3s linear infinite;
  }

  a:hover svg, a:hover i {
    transform: scale(1.2);
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.4));
  }

  @keyframes spin-conic {
    to { --border-angle: 360deg; }
  }

  /* === DEBRIS PARTICLES === */
  .debris {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    animation: particle-rise linear infinite;
  }

  @keyframes particle-rise {
    0% {
      transform: translateY(110vh) translateX(0) scale(0);
      opacity: 0;
    }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% {
      transform: translateY(-10vh) translateX(20px) scale(1.5);
      opacity: 0;
    }
  }

  /* === GHOST TRAILS === */
  .ghost {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
    background: radial-gradient(circle, rgba(255,215,0,0.5) 0%, transparent 70%);
    animation: ghost-fade 0.8s ease-out forwards;
  }
  @keyframes ghost-fade {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
  }

  /* === SHOCKWAVE CANVAS === */
  .shockwave {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 25;
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    h1 { 
      font-size: clamp(3.5rem, 14vw, 6rem); 
      margin-bottom: 2.8rem; 
      text-shadow:
        0 0 0 var(--gold),
        1px 1px 0 rgba(230,159,0,0.4),
        2px 2px 0 rgba(220,20,60,0.25),
        4px 4px 0 rgba(0,35,102,0.2),
        0 0 30px rgba(220,20,60,0.15),
        0 10px 30px rgba(0,0,0,0.6);
    }
    a { 
      font-size: 1.15rem; 
      padding: 0.75rem 2.2rem; 
    }
    .content {
      gap: 2rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

  <script>
    // === 3D TILT ON CONTENT ===
    const content = document.getElementById('content');
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5);
      const y = (e.clientY / window.innerHeight - 0.5);
      document.body.style.setProperty('--mx', x + 0.5);
      document.body.style.setProperty('--my', y + 0.5);
      content.style.transform = `rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
      
      // Parallax warp field
      document.querySelectorAll('.plasma').forEach((orb, i) => {
        const depth = (i + 1) * 12;
        orb.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
      });
    });

    // === PARTICLE DEBRIS ===
    const debris = document.getElementById('debris');
    const colors = ['#FFD700', '#DC143C', '#002366', '#E69F00', '#f0ede8'];
    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 12 + 8) + 's';
      p.style.animationDelay = Math.random() * 4 + 's';
      const size = Math.random() * 2 + 1;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      debris.appendChild(p);
      setTimeout(() => p.remove(), 22000);
    }
    setInterval(spawnParticle, 600);

    // === GHOST TRAILS ===
    document.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.82) return;
      const g = document.createElement('div');
      g.className = 'ghost';
      g.style.left = (e.clientX - 4) + 'px';
      g.style.top = (e.clientY - 4) + 'px';
      document.body.appendChild(g);
      setTimeout(() => g.remove(), 800);
    });

    // === FAST-MOUSE LATTICE REVEAL ===
    let lastX = 0, lastY = 0, lastTime = Date.now();
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      const dt = now - lastTime;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const speed = Math.sqrt(dx*dx + dy*dy) / (dt || 1);
      lastX = e.clientX; lastY = e.clientY; lastTime = now;
      if (speed > 2.5) {
        document.body.classList.add('lattice-active');
        clearTimeout(window._latTimer);
        window._latTimer = setTimeout(() => document.body.classList.remove('lattice-active'), 400);
      }
    });

    // === SHOCKWAVE CANVAS ===
    const canvas = document.getElementById('shockwave');
    const ctx = canvas.getContext('2d');
    let waves = [];
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('click', (e) => {
      waves.push({ x: e.clientX, y: e.clientY, r: 0, a: 1 });
    });

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      waves = waves.filter(w => w.a > 0);
      waves.forEach(w => {
        w.r += 10;
        w.a -= 0.025;
        // Gold ring
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,215,0,${w.a * 0.5})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        // Crimson echo
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r * 0.7, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(220,20,60,${w.a * 0.3})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Royal core
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r * 0.4, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,35,102,${w.a * 0.2})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

</body>
</html>
