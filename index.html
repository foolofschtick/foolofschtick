<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Futura:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=OCR+A&display=swap');
  
  * { margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }

  :root {
    --crimson: #DC143C;
    --oxblood: #4A0404;
    --gold: #D4AF37;
    --cadmium: #E69F00;
    --royal: #002366;
    --ultramarine: #120A8F;
    --tyrian: #66023C;
    --void: #0a0a0f;
    --mist: rgba(255, 248, 240, 0.03);
  }

  body {
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--void);
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }

  /* Film grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 101;
  }

  /* Dimensional orb field */
  .orb-field {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    z-index: 0;
    pointer-events: none;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    mix-blend-mode: screen;
    will-change: transform;
  }

  .orb-core {
    width: 40vw;
    height: 40vw;
    background: radial-gradient(circle, var(--crimson) 0%, transparent 70%);
    top: 20%;
    left: 30%;
    animation: breathe 12s ease-in-out infinite;
    filter: blur(80px);
  }

  .orb-abyss {
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, var(--royal) 0%, var(--ultramarine) 40%, transparent 70%);
    bottom: 10%;
    right: 20%;
    animation: breathe 15s ease-in-out infinite reverse;
    filter: blur(100px);
    opacity: 0.8;
  }

  .orb-gold {
    width: 25vw;
    height: 25vw;
    background: radial-gradient(circle, var(--gold) 0%, var(--cadmium) 30%, transparent 60%);
    top: 60%;
    left: 15%;
    animation: drift-gold 18s ease-in-out infinite;
    filter: blur(50px);
    opacity: 0.6;
  }

  .orb-void {
    width: 35vw;
    height: 35vw;
    background: radial-gradient(circle, var(--oxblood) 0%, var(--tyrian) 20%, transparent 65%);
    top: 10%;
    right: 10%;
    animation: drift-void 20s ease-in-out infinite;
    filter: blur(90px);
    opacity: 0.5;
    mix-blend-mode: multiply;
  }

  .orb-ghost {
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
    top: 40%;
    left: 20%;
    animation: pulse-ghost 25s ease-in-out infinite;
    filter: blur(120px);
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1) translate(0, 0); }
    33% { transform: scale(1.15) translate(30px, -20px); }
    66% { transform: scale(0.9) translate(-20px, 30px); }
  }

  @keyframes drift-gold {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(50px, -30px) rotate(5deg); }
    50% { transform: translate(-30px, 50px) rotate(-3deg); }
    75% { transform: translate(20px, 20px) rotate(2deg); }
  }

  @keyframes drift-void {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(-40px, 30px); }
    66% { transform: translate(30px, -40px); }
  }

  @keyframes pulse-ghost {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  /* Chromatic aberration layer */
  .chromatic-wrap {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s;
  }

  body:hover .chromatic-wrap {
    opacity: 0.08;
  }

  .chromatic-r {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255, 0, 0, 0.3) 0%, transparent 50%);
    animation: chromatic-shift 8s ease-in-out infinite;
  }

  .chromatic-b {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 70% 60%, rgba(0, 0, 255, 0.3) 0%, transparent 50%);
    animation: chromatic-shift 8s ease-in-out infinite reverse;
  }

  @keyframes chromatic-shift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(10px, -10px); }
  }

  /* Main content structure */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4rem;
  }

  /* Title treatment - dimensional typography */
  .title-wrap {
    position: relative;
    perspective: 1000px;
  }

  h1 {
    font-family: 'Futura', 'Trebuchet MS', sans-serif;
    font-weight: 900;
    font-size: clamp(4rem, 12vw, 10rem);
    color: #f0f0f0;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    position: relative;
    transform-style: preserve-3d;
    animation: title-assemble 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  h1 .word {
    display: block;
    position: relative;
  }

  h1 .word:nth-child(1) {
    font-size: 1.2em;
    color: var(--gold);
    text-shadow: 
      0 0 20px rgba(212, 175, 55, 0.3),
      0 0 60px rgba(212, 175, 55, 0.1);
    animation: word-float6s ease-in-out infinite;
    animation-delay: 0.2s;
  }

  h1 .word:nth-child(2) {
    font-size: 0.35em;
    font-weight: 300;
    letter-spacing: 0.5em;
    color: var(--crimson);
    margin: 0.2em 0;
    opacity: 0.9;
  }

  h1 .word:nth-child(3) {
    font-size: 0.9em;
    color: #fff;
    text-shadow: 
      0 0 30px rgba(255, 255, 255, 0.2),
      0 0 80px rgba(220, 20, 60, 0.15);
    animation: word-float 7s ease-in-out infinite reverse;
    animation-delay: 0.5s;
  }

  @keyframes title-assemble {
    0% {
      opacity: 0;
      transform: translateZ(-200px) rotateX(15deg);
      filter: blur(20px);
    }
    100% {
      opacity: 1;
      transform: translateZ(0) rotateX(0);
      filter: blur(0);
    }
  }

  @keyframes word-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Constellation link network */
  .link-constellation {
    position: relative;
    width: 100%;
    max-width: 600px;
    height: 400px;
    opacity: 0;
    animation: fade-up 1s ease-out 1.5s forwards;
  }

  .link-node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
 }

  .link-node .glyph {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.6);
    border: 1px solid rgba(212, 175, 55, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--gold);
    font-size: 1.3rem;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .link-node .glyph::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from0deg, var(--gold), var(--crimson), var(--royal), var(--gold));
    opacity: 0;
    transition: opacity 0.4s;
    z-index: -1;
  }

  .link-node .glyph::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: 50%;
    background: var(--void);
    z-index: -1;
  }

  .link-node .label {
    font-family: 'Fira Code', monospace;
    font-size: 0.65rem;
    color: rgba(240, 240, 240, 0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(-5px);
  }

  .link-node:hover .glyph {
    transform: scale(1.15);
    border-color: transparent;
    box-shadow: 
      0 0 30px rgba(212, 175, 55, 0.2),
      0 0 60px rgba(220, 20, 60, 0.1);
  }

  .link-node:hover .glyph::before {
    opacity: 1;
    animation: rotate-gradient 3s linear infinite;
  }

  .link-node:hover .label {
    opacity: 1;
    transform: translateY(0);
    color: var(--gold);
  }

  @keyframes rotate-gradient {
    to { transform: rotate(360deg); }
  }

  /* Constellation positions */
  .node-x { top: 5%; left: 50%; transform: translateX(-50%); }
  .node-ig { top: 25%; right: 5%; }
  .node-tt { top: 60%; right: 10%; }
  .node-fb { top: 60%; left: 10%; }
  .node-yt { top: 25%; left: 5%; }
  .node-em { bottom: 5%; left: 50%; transform: translateX(-50%); }

  /* Connecting lines SVG */
  .constellation-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
  }

  .constellation-lines line {
    stroke: rgba(212, 175, 55, 0.08);
    stroke-width: 1;
    stroke-dasharray: 5 10;
    animation: dash-flow 20s linear infinite;
  }

  @keyframes dash-flow {
    to { stroke-dashoffset: -300; }
  }

  /* Vignette frame */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.5);
  }

  /* Interactive lens distortion */
  .lens {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s;
    mix-blend-mode: overlay;
  }

  body:hover .lens {
    opacity: 1;
  }

  /* Ambient particles */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    animation: particle-drift linear infinite;
  }

  @keyframes particle-drift {
    0% {
      opacity: 0;
      transform: translateY(100vh) scale(0);
    }
    10% {
      opacity: 0.8;
    }
    90% {
      opacity: 0.8;
    }
    100% {
      opacity: 0;
      transform: translateY(-10vh) scale(1);
    }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .link-constellation {
      height: 350px;
    }
    
    .link-node .glyph {
      width: 48px;
      height: 48px;
 font-size: 1.1rem;
    }
    
    .link-node .label {
      font-size: 0.6rem;
    }
    
    h1 {
      font-size: clamp(3rem, 15vw, 5rem);
    }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
 transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

  <script>
 // Lens distortion follow
    const lens = document.getElementById('lens');
    let mouseX = 0, mouseY = 0;
    let lensX = 0, lensY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateLens() {
      lensX += (mouseX - lensX) * 0.1;
      lensY += (mouseY - lensY) * 0.1;
      lens.style.left = lensX + 'px';
      lens.style.top = lensY + 'px';
      requestAnimationFrame(animateLens);
    }
    animateLens();

    // Generate ambient particles
    function createParticle() {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      const size = Math.random() * 3 + 1;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      
      const colors = ['#D4AF37', '#DC143C', '#002366', '#E69F00'];
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      
      document.body.appendChild(particle);
      
      setTimeout(() => particle.remove(), 25000);
    }

    setInterval(createParticle, 800);

 // Subtle parallax on orbs
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      
      document.querySelectorAll('.orb').forEach((orb, i) => {
        const depth = (i + 1) * 15;
        orb.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
      });
    });
  </script>
