<meta charset="UTF-8">

<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Kalam', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(165deg, #FFF8F5 0%, #F0F6FA 60%, #D6E5F0 100%);
    overflow: hidden;
    position: relative;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    animation: drift ease-in-out infinite;
  }

  .orb-sun {
    width: 55vw; height: 55vw;
    background: rgba(217, 108, 63, 0.35);
    top: -15vw; left: -10vw;
    animation-duration: 20s;
  }

  .orb-blue {
    width: 45vw; height: 45vw;
    background: rgba(163, 194, 216, 0.40);
    bottom: -15vw; right: -10vw;
    animation-duration: 24s;
    animation-delay: -6s;
  }

  .orb-haze {
    width: 35vw; height: 35vw;
    background: rgba(244, 225, 210, 0.35);
    top: 30%; left: 35%;
    animation-duration: 28s;
    animation-delay: -12s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(25px, -35px) scale(1.08); }
    66% { transform: translate(-15px, 25px) scale(0.96); }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
  }

  h1 {
    font-family: 'Permanent Marker', cursive;
    font-size: 6.5rem;
    color: #12121A;
    line-height: 1;
    margin-bottom: 3.5rem;
    letter-spacing: 3px;
    text-shadow: 
      4px 4px 0px rgba(217, 108, 63, 0.20),
      8px 8px 30px rgba(163, 194, 216, 0.35);
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1.3rem;
    align-items: center;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1.5rem;
    text-decoration: none;
    color: #12121A;
    padding: 0.75rem 2.4rem;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border: 1px solid rgba(163, 194, 216, 0.45);
    box-shadow: 0 4px 20px rgba(18, 18, 26, 0.04);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  a svg {
    width: 1.1em;
    height: 1.1em;
    flex-shrink: 0;
  }

  a:nth-child(1) { transform: rotate(-1.8deg); }
  a:nth-child(2) { transform: rotate(1.2deg); }
  a:nth-child(3) { transform: rotate(-0.8deg); }
  a:nth-child(4) { transform: rotate(1.5deg); }
  a:nth-child(5) { transform: rotate(-0.4deg); }

  a:hover {
    transform: scale(1.06) rotate(0deg);
    background: rgba(217, 108, 63, 0.12);
    border-color: rgba(217, 108, 63, 0.35);
    box-shadow: 0 8px 35px rgba(217, 108, 63, 0.12);
    color: #000;
  }

  @media (max-width: 600px) {
    h1 { font-size: 4.5rem; margin-bottom: 2.5rem; }
    a { font-size: 1.25rem; padding: 0.6rem 2rem; }
  }
</style>
</head>
