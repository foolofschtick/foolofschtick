<!DOCTYPE html>
<html>
<head>
<title>Fool of Schtick</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    text-align: center;
    background-color: #0f1f14;
    background-image: radial-gradient(circle at 50% 45%, #1b4332 0%, #08140e 70%, #020504 100%);
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .void-left, .void-right {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 80px;
    background: #000000;
    z-index: 10;
    pointer-events: none;
    box-shadow: 0 0 60px rgba(0,0,0,0.95);
  }
  .void-left { left: 0; }
  .void-right { right: 0; }

  .noise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    z-index: 15;
    pointer-events: none;
    background-image: repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%);
    filter: contrast(150%);
  }

  .seed-glow {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,20,147,0.25) 0%, rgba(255,20,147,0) 70%);
    filter: blur(40px);
    z-index: 1;
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  .live-indicator {
    position: fixed;
    top: 30px;
    right: 100px;
    z-index: 20;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: #FF0000;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }
  .live-indicator::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #FF0000;
    border-radius: 50%;
    box-shadow: 0 0 10px #FF0000;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-family: 'Courier New', Courier, monospace;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 10px;
    position: relative;
    z-index: 5;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    color: #FFFFFF;
    cursor: pointer;
  }

  .link-container {
    position: relative;
    z-index: 5;
    background: rgba(0,0,0,0.45);
    padding: 30px 50px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: bottom 0.5s ease;
  }

  .link-container.physics-mode {
    position: fixed;
    left: 50%;
    bottom: 30px;
    margin-left: -180px;
    z-index: 60;
    width: 360px;
    padding: 20px 0;
  }

  .link-container.physics-mode a {
    margin: 8px 0;
    font-size: 11px;
  }

  a {
    display: block;
    margin: 14px 0;
    font-size: 13px;
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    text-decoration: none;
    color: #FF1493;
    text-transform: uppercase;
    letter-spacing: 3px;
    position: relative;
    transition: all 0.3s ease;
    text-shadow: 0 0 15px rgba(255,20,147,0.6), 0 0 30px rgba(255,20,147,0.3);
  }

  a:hover {
    color: #ff69b4;
    text-shadow: 0 0 25px rgba(255,20,147,0.9), 0 0 50px rgba(255,20,147,0.5);
    letter-spacing: 5px;
  }

  .letter {
    display: inline-block;
    will-change: transform;
  }

  #shitstorm {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 50;
    display: none;
    cursor: crosshair;
  }
</style>
</head>
<body>

<div class="void-left"></div>
<div class="void-right"></div>
<div class="noise"></div>
<div class="seed-glow"></div>

<div class="live-indicator">LIVE</div>

<h1>Fool of Schtick</h1>

<div class="link-container" id="linkContainer">
  <a href="https://x.com/foolofschtick">X.com</a>
  <a href="https://www.instagram.com/foolofschtick?igsh=MzRlODBiNWFlZA==">Instagram</a>
  <a href="https://www.tiktok.com/@foolofschtick?_r=1&_t=ZT-96t2iCgbA7y">TikTok</a>
  <a href="https://www.facebook.com/61590695035991/">Facebook</a>
  <a href="mailto:contact@foolofschtick.com">Email</a>
</div>

<canvas id="shitstorm"></canvas>

<script>
  const rand = (min, max) => Math.random() * (max - min) + min;

  // --- SPRING GLITCH ---
  const targets = document.querySelectorAll('h1, a');
  const allLetters = [];

  targets.forEach(el => {
    const rawText = el.textContent;
    el.innerHTML = '';
    for (let i = 0; i < rawText.length; i++) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = rawText[i] === ' ' ? '\u00A0' : rawText[i];
      el.appendChild(span);
      allLetters.push({ el: span, x: 0, y: 0, r: 0, vx: 0, vy: 0, vr: 0, tx: 0, ty: 0, tr: 0 });
    }
  });

  let isGlitching = false;
  function unleashChaos() {
    if (isGlitching) return;
    isGlitching = true;
    allLetters.forEach(l => { l.tx = rand(-50,50); l.ty = rand(-35,35); l.tr = rand(-20,20); });
    setTimeout(() => {
      allLetters.forEach(l => { l.tx = 0; l.ty = 0; l.tr = 0; });
      setTimeout(() => { isGlitching = false; scheduleGlitch(); }, 1500);
    }, 2000);
  }
  function scheduleGlitch() { setTimeout(unleashChaos, rand(10000,20000)); }

  const TENSION = 0.06, FRICTION = 0.82;
  let physicsMode = false;
  let springRafId;

  function springLoop() {
    if (physicsMode) return;
    allLetters.forEach(l => {
      l.vx = (l.vx + (l.tx-l.x)*TENSION) * FRICTION;
      l.vy = (l.vy + (l.ty-l.y)*TENSION) * FRICTION;
      l.vr = (l.vr + (l.tr-l.r)*TENSION) * FRICTION;
      l.x += l.vx; l.y += l.vy; l.r += l.vr;
      l.el.style.transform = `translate3d(${l.x.toFixed(2)}px,${l.y.toFixed(2)}px,0) rotate(${l.r.toFixed(2)}deg)`;
    });
    springRafId = requestAnimationFrame(springLoop);
  }
  springRafId = requestAnimationFrame(springLoop);
  scheduleGlitch();

  // --- PHYSICS MODE ---
  const h1El = document.querySelector('h1');
  const linkContainer = document.getElementById('linkContainer');
  const canvas = document.getElementById('shitstorm');
  const ctx = canvas.getContext('2d');

  const BROWNS = ['#3d2817','#5d3a1a','#8b4513','#a0522d','#cd853f','#d2691e','#654321','#4e342e'];
  const WALL_THICKNESS = 35;
  const RESTITUTION = 0.6;

  // Wide, deep U matching inner edge of 480px rotated C — thick walls make the whole C feel solid
  const BUCKET_POINTS = [
    {x:-120,y:-200}, {x:-125,y:-150}, {x:-128,y:-100}, {x:-130,y:-50}, {x:-130,y:0},
    {x:-110,y:70}, {x:-65,y:120}, {x:0,y:140}, {x:65,y:120}, {x:110,y:70},
    {x:130,y:0}, {x:130,y:-50}, {x:128,y:-100}, {x:125,y:-150}, {x:120,y:-200}
  ];

  let particles = [], segments = [], grid = {};
  let pouring = false;
  let floorJiggle = 0;

  const bucket = { x:0, y:0, restX:0, restY:0, vx:0, vy:0 };

  function Particle(x,y) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*1.2; this.vy=Math.random()*1.5+1.5;
    this.r=3+Math.random()*4;
    this.color=BROWNS[Math.floor(Math.random()*BROWNS.length)];
  }

  function clearGrid() { grid={}; }
  function addToGrid(p,idx) {
    const cx=Math.floor(p.x/10), cy=Math.floor(p.y/10);
    const key=cx+','+cy;
    if(!grid[key]) grid[key]=[];
    grid[key].push(idx);
  }
  function getGrid(cx,cy) { return grid[cx+','+cy]||[]; }

  function closestPointOnSegment(px,py,x1,y1,x2,y2) {
    const dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
    if(len2===0) return {x:x1,y:y1};
    let t=((px-x1)*dx+(py-y1)*dy)/len2;
    t=Math.max(0,Math.min(1,t));
    return {x:x1+t*dx, y:y1+t*dy};
  }

  function initPhysics() {
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    bucket.restX=canvas.width/2; bucket.restY=canvas.height*0.38;
    bucket.x=bucket.restX; bucket.y=bucket.restY;
    bucket.vx=0; bucket.vy=0;
    segments=[];
    for(let i=0;i<14;i++) {
      const p1=BUCKET_POINTS[i], p2=BUCKET_POINTS[i+1];
      segments.push({p1:p1,p2:p2,mx:(p1.x+p2.x)/2,my:(p1.y+p2.y)/2});
    }
  }

  function updatePhysics() {
    if(pouring) {
      const count=2+Math.floor(Math.random()*2);
      for(let i=0;i<count;i++) particles.push(new Particle(bucket.restX+(Math.random()-0.5)*50,-10));
    }

    // Stable bucket
    bucket.vx+=(bucket.restX-bucket.x)*0.008;
    bucket.vy+=(bucket.restY-bucket.y)*0.008;
    bucket.vx*=0.94; bucket.vy*=0.94;
    bucket.x+=bucket.vx; bucket.y+=bucket.vy;

    // Particle integration
    for(let i=0;i<particles.length;i++) {
      const p=particles[i];
      p.vy+=0.2;
      p.vx*=0.99; p.vy*=0.99;
      p.vx=Math.max(-8,Math.min(8,p.vx));
      p.vy=Math.max(-8,Math.min(8,p.vy));
      p.x+=p.vx; p.y+=p.vy;
    }

    // PP collision
    clearGrid();
    for(let i=0;i<particles.length;i++) addToGrid(particles[i],i);
    for(let i=0;i<particles.length;i++) {
      const p1=particles[i], cx=Math.floor(p1.x/10), cy=Math.floor(p1.y/10);
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) {
        const cell=getGrid(cx+dx,cy+dy);
        for(let j=0;j<cell.length;j++) {
          const k=cell[j]; if(k<=i) continue;
          const p2=particles[k], dx_=p2.x-p1.x, dy_=p2.y-p1.y, dist=Math.sqrt(dx_*dx_+dy_*dy_);
          const minDist=p1.r+p2.r;
          if(dist<minDist&&dist>0.001) {
            const overlap=minDist-dist, nx=dx_/dist, ny=dy_/dist;
            p1.x-=nx*overlap*0.5; p1.y-=ny*overlap*0.5;
            p2.x+=nx*overlap*0.5; p2.y+=ny*overlap*0.5;
            const avgVx=(p1.vx+p2.vx)*0.5, avgVy=(p1.vy+p2.vy)*0.5;
            p1.vx=avgVx*0.85+p1.vx*0.15; p1.vy=avgVy*0.85+p1.vy*0.15;
            p2.vx=avgVx*0.85+p2.vx*0.15; p2.vy=avgVy*0.85+p2.vy*0.15;
          }
        }
      }
    }

    // Segment collision — thick walls, strong bounce
    for(let i=0;i<particles.length;i++) {
      const p=particles[i];
      for(let j=0;j<segments.length;j++) {
        const s=segments[j];
        const x1=bucket.x+s.p1.x, y1=bucket.y+s.p1.y, x2=bucket.x+s.p2.x, y2=bucket.y+s.p2.y;
        const closest=closestPointOnSegment(p.x,p.y,x1,y1,x2,y2);
        const cdx=p.x-closest.x, cdy=p.y-closest.y, dist=Math.sqrt(cdx*cdx+cdy*cdy);
        if(dist<p.r+WALL_THICKNESS&&dist>0.001) {
          const overlap=p.r+WALL_THICKNESS-dist, nx=cdx/dist, ny=cdy/dist;
          p.x+=nx*overlap; p.y+=ny*overlap;
          const vdotn=p.vx*nx+p.vy*ny;
          if(vdotn<0) {
            p.vx-=vdotn*nx*(1+RESTITUTION); p.vy-=vdotn*ny*(1+RESTITUTION);
          }
          const tx=-ny, ty=nx, vdott=p.vx*tx+p.vy*ty;
          p.vx-=vdott*tx*0.5; p.vy-=vdott*ty*0.5;
        }
      }
    }

    // Floor box collision
    const fbTop=canvas.height-210, fbLeft=canvas.width/2-180, fbRight=canvas.width/2+180;
    for(let i=0;i<particles.length;i++) {
      const p=particles[i];
      if(p.x>fbLeft&&p.x<fbRight&&p.y+p.r>fbTop&&p.vy>0) {
        p.y=fbTop-p.r; p.vy*=-0.3; p.vx*=0.9;
        floorJiggle-=0.6;
      }
    }
    floorJiggle*=0.2;
    const jiggleY=Math.max(-1.5,Math.min(1.5,floorJiggle));
    linkContainer.style.transform=jiggleY!==0?`translate3d(0,${jiggleY}px,0)`:'';

    // Cull
    for(let i=particles.length-1;i>=0;i--) if(particles[i].y>canvas.height+50) particles.splice(i,1);
    if(particles.length>15000) particles.splice(0,particles.length-15000);
  }

  function drawCBucket() {
    ctx.save();
    ctx.translate(bucket.x,bucket.y);
    ctx.rotate(-Math.PI/2);
    ctx.font='bold 480px "Courier New",Courier,monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#FFFFFF';
    ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=40;
    ctx.fillText('C',0,0);
    ctx.restore();
    ctx.shadowBlur=0;
  }

  function renderPhysics() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawCBucket();
    for(let i=0;i<particles.length;i++) {
      const p=particles[i];
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
    }
    if(pouring) {
      ctx.fillStyle='rgba(255,20,147,0.2)';
      ctx.font='10px Arial,sans-serif'; ctx.textAlign='center';
      ctx.fillText('THE VOID CONSUMES ALL',canvas.width/2,canvas.height-40);
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.font='9px Arial,sans-serif';
      ctx.fillText(particles.length+' PARTICLES',canvas.width/2,canvas.height-25);
    }
  }

  let physicsRafId;
  function physicsLoop() {
    if(!physicsMode) return;
    updatePhysics();
    renderPhysics();
    physicsRafId=requestAnimationFrame(physicsLoop);
  }

  // --- CLICK HANDLER ---
  h1El.addEventListener('click',()=>{
    if(physicsMode) return;
    physicsMode=true;

    // Reset link letters
    document.querySelectorAll('a .letter').forEach(span=>{
      span.style.transform='none'; span.style.opacity='1';
    });
    linkContainer.classList.add('physics-mode');

    // Get h1 letters, find C after S
    const h1Letters=allLetters.filter(l=>l.el.parentElement===h1El);
    let cIdx=h1Letters.findIndex((l,i)=>l.el.textContent==='c'&&i>0&&h1Letters[i-1].el.textContent==='S');
    if(cIdx<0) cIdx=h1Letters.findIndex(l=>l.el.textContent==='c');
    if(cIdx<0) cIdx=0;
    const cLetter=h1Letters[cIdx];

    // Snap C to fixed position, freeze others
    h1Letters.forEach((l,i)=>{
      if(i===cIdx) {
        const rect=l.el.getBoundingClientRect();
        l.el.style.position='fixed';
        l.el.style.left=rect.left+'px';
        l.el.style.top=rect.top+'px';
        l.el.style.margin='0';
        l.el.style.zIndex='100';
        l.el.style.transform='none';
      } else {
        const computed=window.getComputedStyle(l.el).transform;
        l.el.style.transform=computed==='none'?'':computed;
      }
    });
    void h1El.offsetWidth;

    // Set transitions
    h1Letters.forEach((l,i)=>{
      if(i===cIdx) l.el.style.transition='transform 2s ease-in-out';
      else l.el.style.transition='transform 0.6s ease, opacity 0.6s ease';
    });

    // Reset non-C letters to normal alignment
    h1Letters.forEach((l,i)=>{
      if(i===cIdx) return;
      l.el.style.transform='none';
      l.el.style.opacity='1';
    });

    // Swap t and i to spell "Shitck"
    if(h1Letters[11]&&h1Letters[11].el.textContent==='t') h1Letters[11].el.textContent='i';
    if(h1Letters[12]&&h1Letters[12].el.textContent==='i') h1Letters[12].el.textContent='t';

    // Animate C out: grow, rotate, move to center
    const rect=cLetter.el.getBoundingClientRect();
    const targetX=window.innerWidth/2, targetY=window.innerHeight*0.38;
    const dx=targetX-(rect.left+rect.width/2), dy=targetY-(rect.top+rect.height/2);
    cLetter.el.style.transform=`translate3d(${dx}px,${dy}px,0) rotate(-90deg) scale(9)`;

    // Fade out "Fool of Shitck" starting at 0.5s
    setTimeout(()=>{
      h1Letters.forEach((l,i)=>{
        if(i===cIdx) return;
        l.el.style.transition='transform 1.5s ease-in-out, opacity 1.5s ease-in-out';
        l.el.style.transform='scale(0)';
        l.el.style.opacity='0';
      });
    },500);

    // Show canvas
    canvas.style.display='block';
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;

    // After transition: handoff to canvas
    setTimeout(()=>{
      initPhysics();
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawCBucket();
      cLetter.el.style.display='none';
      physicsLoop();
      setTimeout(()=>{ pouring=true; },1500);
    },2000);
  });

  canvas.addEventListener('click',(e)=>{
    if(!physicsMode) return;
    for(let i=0;i<25;i++) particles.push(new Particle(e.clientX+rand(-40,40),e.clientY+rand(-40,40)));
  });

  window.addEventListener('resize',()=>{
    if(!physicsMode) return;
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    bucket.restX=canvas.width/2; bucket.restY=canvas.height*0.38;
  });
</script>

</body>
</html>
