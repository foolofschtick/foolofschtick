<!DOCTYPE html>
<html>
<head>
<title>Fool of Schtick</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    text-align: center;
    background-color: #0f1f14;
    background-image: radial-gradient(circle at 50% 45%, #1b4332 0%, #08140e 70%, #020504 100%);
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .void-left, .void-right {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 80px;
    background: #000000;
    z-index: 10;
    pointer-events: none;
    box-shadow: 0 0 60px rgba(0,0,0,0.95);
  }
  .void-left { left: 0; }
  .void-right { right: 0; }

  .noise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    z-index: 15;
    pointer-events: none;
    background-image: repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%);
    filter: contrast(150%);
  }

  .seed-glow {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,20,147,0.25) 0%, rgba(255,20,147,0) 70%);
    filter: blur(40px);
    z-index: 1;
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }


  .live-indicator {
    position: fixed;
    top: 30px;
    right: 100px;
    z-index: 20;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: #FF0000;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }
  .live-indicator::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #FF0000;
    border-radius: 50%;
    box-shadow: 0 0 10px #FF0000;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-family: 'Courier New', Courier, monospace;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 50px;
    position: relative;
    z-index: 5;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    color: #FFFFFF;
  }


  .link-container {
    position: relative;
    z-index: 5;
    background: rgba(0,0,0,0.45);
    padding: 30px 50px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  a {
    display: block;
    margin: 14px 0;
    font-size: 13px;
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    text-decoration: none;
    color: #FF1493;
    text-transform: uppercase;
    letter-spacing: 3px;
    position: relative;
    transition: all 0.3s ease;
    text-shadow: 0 0 15px rgba(255,20,147,0.6), 0 0 30px rgba(255,20,147,0.3);
  }

  a:hover {
    color: #ff69b4;
    text-shadow: 0 0 25px rgba(255,20,147,0.9), 0 0 50px rgba(255,20,147,0.5);
    letter-spacing: 5px;
  }

  .letter {
    display: inline-block;
    will-change: transform;
  }
</style>
</head>
<body>

<div class="void-left"></div>
<div class="void-right"></div>
<div class="noise"></div>
<div class="seed-glow"></div>

<div class="live-indicator">LIVE</div>

<h1>Fool of Schtick</h1>

<div class="link-container">
  <a href="https://x.com/foolofschtick">X.com</a>
  <a href="https://www.instagram.com/foolofschtick?igsh=MzRlODBiNWFlZA==">Instagram</a>
  <a href="https://www.tiktok.com/@foolofschtick?_r=1&_t=ZT-96t2iCgbA7y">TikTok</a>
  <a href="https://www.facebook.com/61590695035991/">Facebook</a>
  <a href="mailto:contact@foolofschtick.com">Email</a>
</div>

<script>
  const rand = (min, max) => Math.random() * (max - min) + min;

  // Grab every element we want to ruin
  const targets = document.querySelectorAll('h1, a');
  const allLetters = [];

  targets.forEach(el => {
    const rawText = el.textContent;
    el.innerHTML = '';

    for (let i = 0; i < rawText.length; i++) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = rawText[i] === ' ' ? '\u00A0' : rawText[i];
      el.appendChild(span);

      allLetters.push({
        el: span,
        x: 0, y: 0, r: 0,
        vx: 0, vy: 0, vr: 0,
        tx: 0, ty: 0, tr: 0
      });
    }
  });

  let isGlitching = false;

  function unleashChaos() {
    if (isGlitching) return;
    isGlitching = true;

    allLetters.forEach(l => {
      l.tx = rand(-50, 50);
      l.ty = rand(-35, 35);
      l.tr = rand(-20, 20);
    });

    setTimeout(() => {
      allLetters.forEach(l => { l.tx = 0; l.ty = 0; l.tr = 0; });
      setTimeout(() => {
        isGlitching = false;
        scheduleGlitch();
      }, 1500);
    }, 2000);
  }

  function scheduleGlitch() {
    const delay = rand(10000, 20000);
    setTimeout(unleashChaos, delay);
  }

  const TENSION = 0.06;
  const FRICTION = 0.82;

  function springLoop() {
    allLetters.forEach(l => {
      const ax = (l.tx - l.x) * TENSION;
      const ay = (l.ty - l.y) * TENSION;
      const ar = (l.tr - l.r) * TENSION;

      l.vx = (l.vx + ax) * FRICTION;
      l.vy = (l.vy + ay) * FRICTION;
      l.vr = (l.vr + ar) * FRICTION;

      l.x += l.vx;
      l.y += l.vy;
      l.r += l.vr;

      l.el.style.transform = `translate3d(${l.x.toFixed(2)}px, ${l.y.toFixed(2)}px, 0) rotate(${l.r.toFixed(2)}deg)`;
    });
    requestAnimationFrame(springLoop);
  }

  springLoop();
  scheduleGlitch();
</script>

</body>
</html>
