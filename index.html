<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  @property --border-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @property --vortex-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @property --shimmer { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crimson: #DC143C;
    --oxblood: #0f0000;
    --gold: #FFD700;
    --cadmium: #E69F00;
    --royal: #002366;
    --ultramarine: #0a0044;
    --tyrian: #2a0138;
    --void: #030104;
    --milk: #f0ede8;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--void);
  }

  body {
    font-family: 'Fira Code', 'OCR-A', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    perspective: 1400px;
  }

  /* ===== COSMIC BACKGROUND ===== */
  .cosmos {
    position: fixed;
    inset: -30%;
    width: 160%;
    height: 160%;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, var(--oxblood) 0%, var(--void) 45%);
  }

  .nebula {
    position: absolute;
    filter: blur(220px) saturate(2);
    mix-blend-mode: screen;
    pointer-events: none;
    will-change: transform;
    opacity: 0.4;
  }

  .nebula-crimson {
    width: 90vw; height: 90vw;
    background: radial-gradient(circle, var(--crimson) 0%, transparent 70%);
    top: -35%; left: -40%;
    animation: drift-1 25s ease-in-out infinite alternate;
  }
  .nebula-royal {
    width: 85vw; height: 85vw;
    background: radial-gradient(circle, var(--royal) 0%, var(--ultramarine) 45%, transparent 75%);
    bottom: -45%; right: -35%;
    animation: drift-2 30s ease-in-out infinite alternate;
    mix-blend-mode: color-dodge;
    opacity: 0.3;
  }
  .nebula-gold {
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, var(--gold) 0%, var(--cadmium) 40%, transparent 70%);
    top: 15%; left: 5%;
    animation: drift-3 22s ease-in-out infinite alternate;
    mix-blend-mode: overlay;
    opacity: 0.2;
  }
  .nebula-tyrian {
    width: 65vw; height: 65vw;
    background: radial-gradient(circle, var(--tyrian) 0%, transparent 70%);
    top: -15%; right: 0%;
    animation: drift-4 35s ease-in-out infinite alternate;
    opacity: 0.35;
  }
  .nebula-oxblood {
    width: 130vw; height: 130vw;
    background: radial-gradient(circle, var(--oxblood) 0%, transparent 60%);
    top: -20%; left: -20%;
    animation: breathe 32s ease-in-out infinite;
    mix-blend-mode: multiply;
    opacity: 0.95;
    filter: blur(260px);
  }

  @keyframes drift-1 {
    0% { transform: translate(0,0) scale(1) rotate(0deg); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    50% { transform: translate(120px,-100px) scale(1.3) rotate(12deg); border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    100% { transform: translate(-60px,60px) scale(1.05) rotate(-10deg); border-radius: 50% 50% 40% 60% / 40% 50% 60% 50%; }
  }
  @keyframes drift-2 {
    0% { transform: translate(0,0) scale(1); border-radius: 40% 60% 60% 40% / 60% 40% 60% 40%; }
    50% { transform: translate(-130px,-110px) scale(1.35); border-radius: 60% 40% 30% 70% / 40% 60% 40% 60%; }
    100% { transform: translate(70px,-140px) scale(1.12); border-radius: 30% 70% 50% 50% / 50% 40% 70% 50%; }
  }
  @keyframes drift-3 {
    0% { transform: translate(0,0) scale(1) rotate(0deg); border-radius: 50% 50% 40% 60% / 40% 50% 60% 50%; }
    50% { transform: translate(-120px,100px) scale(1.4) rotate(60deg); border-radius: 60% 40% 60% 40% / 60% 40% 60% 40%; }
    100% { transform: translate(50px,-50px) scale(1.25) rotate(-45deg); border-radius: 40% 60% 50% 50% / 50% 60% 40% 60%; }
  }
  @keyframes drift-4 {
    0% { transform: translate(0,0); border-radius: 70% 30% 50% 50% / 30% 50% 50% 70%; }
    100% { transform: translate(-70px,-90px); border-radius: 30% 70% 60% 40% / 60% 40% 70% 40%; }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  /* ===== VORTEX LAYER ===== */
  .vortex {
    position: fixed;
    inset: -80%;
    width: 260%;
    height: 260%;
    z-index: 1;
    pointer-events: none;
    background: conic-gradient(from var(--vortex-angle) at 50% 50%,
      rgba(220,20,60,0.07) 0deg,
      rgba(0,35,102,0.07) 90deg,
      rgba(255,215,0,0.04) 180deg,
      rgba(42,1,56,0.07) 270deg,
      rgba(220,20,60,0.07) 360deg);
    animation: vortex-spin 40s linear infinite;
    filter: blur(140px) saturate(2.5);
    mix-blend-mode: hard-light;
    opacity: 0.5;
  }
  @keyframes vortex-spin { to { --vortex-angle: 360deg; } }

  /* ===== DEPTH ORBS ===== */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: overlay;
    filter: blur(100px);
    opacity: 0.25;
    will-change: transform;
  }
  .orb-1 {
    width: 40vw; height: 40vw;
    background: radial-gradient(circle, var(--crimson), transparent 70%);
    top: 0%; left: -15%;
    animation: orb-drift-1 50s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 35vw; height: 35vw;
    background: radial-gradient(circle, var(--royal), transparent 70%);
    bottom: 5%; right: -15%;
    animation: orb-drift-2 42s ease-in-out infinite alternate;
  }
  .orb-3 {
    width: 30vw; height: 30vw;
    background: radial-gradient(circle, var(--gold), transparent 70%);
    top: 50%; left: 50%;
    animation: orb-drift-3 55s ease-in-out infinite alternate;
  }
  @keyframes orb-drift-1 { to { transform: translate(180px, 120px) scale(1.3); } }
  @keyframes orb-drift-2 { to { transform: translate(-140px, -100px) scale(1.25); } }
  @keyframes orb-drift-3 { to { transform: translate(-120px, -180px) scale(1.35); } }

  /* ===== LATTICE ===== */
  .lattice {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background-image:
      linear-gradient(rgba(255,215,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.02) 1px, transparent 1px);
    background-size: 140px 140px;
    opacity: 0.3;
    mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 60%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 60%);
  }

  /* ===== FILM GRAIN & VIGNETTE ===== */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    background: radial-gradient(circle at 50% 50%, transparent 25%, rgba(3,1,4,0.95) 100%);
    box-shadow: inset 0 0 350px rgba(0,0,0,0.95);
  }

  /* ===== CONTENT ===== */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem;
    max-width: 920px;
    width: 100%;
    transform-style: preserve-3d;
    animation: content-float 12s ease-in-out infinite alternate;
  }

  @keyframes content-float {
    0% { transform: translateY(-8px) rotateX(1.5deg) rotateY(-1.5deg); }
    100% { transform: translateY(8px) rotateX(-1.5deg) rotateY(1.5deg); }
  }

  /* ===== GLASS STAGE ===== */
  .glass-stage {
    position: absolute;
    inset: -90px -110px -70px;
    z-index: -1;
    border-radius: 64px;
    overflow: hidden;
    pointer-events: none;
  }
  .glass-stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(3, 1, 4, 0.22);
    backdrop-filter: blur(100px) saturate(1.8);
    -webkit-backdrop-filter: blur(100px) saturate(1.8);
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow:
      0 120px 240px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.04),
      inset 0 -1px 0 rgba(0,0,0,0.5);
  }
  .glass-rim {
    position: absolute;
    inset: -3px;
    border-radius: inherit;
    background: conic-gradient(from var(--shimmer), var(--crimson), var(--gold), var(--royal), var(--tyrian), var(--crimson));
    opacity: 0.15;
    filter: blur(16px);
    animation: rim-rotate 12s linear infinite;
    z-index: -2;
  }
  @keyframes rim-rotate { to { --shimmer: 360deg; } }

  /* ===== TITLE ===== */
  h1 {
    font-family: 'Futura', 'Trebuchet MS', 'Arial Black', 'Bauhaus 93', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 15vw, 13rem);
    color: var(--milk);
    line-height: 0.88;
    margin-bottom: 5.5rem;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    position: relative;
    opacity: 0;
    animation: title-enter 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards, title-breathe 5s ease-in-out infinite 2.2s;
    text-shadow:
      1px 1px 0 rgba(230,159,0,0.5),
      2px 2px 0 rgba(220,20,60,0.4),
      3px 3px 0 rgba(0,35,102,0.3),
      4px 4px 0 rgba(42,1,56,0.25),
      5px 5px 0 rgba(0,0,0,0.45),
      6px 6px 0 rgba(0,0,0,0.4),
      7px 7px 0 rgba(0,0,0,0.35),
      8px 8px 0 rgba(0,0,0,0.3),
      0 0 60px rgba(220,20,60,0.35),
      0 0 120px rgba(0,35,102,0.3),
      0 0 200px rgba(255,215,0,0.12),
      0 40px 100px rgba(0,0,0,0.75);
  }

  h1::after {
    content: 'Fool of Schtick';
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    color: transparent;
    z-index: -1;
    text-shadow:
      0 0 100px rgba(220,20,60,0.6),
      0 0 200px rgba(0,35,102,0.5),
      0 0 300px rgba(42,1,56,0.5);
    animation: title-glow-pulse 5s ease-in-out infinite 2.2s;
    pointer-events: none;
  }

  @keyframes title-enter {
    0% { opacity: 0; transform: translateZ(-500px) scale(0.65) rotateX(25deg); filter: blur(60px); }
    100% { opacity: 1; transform: translateZ(0) scale(1) rotateX(0deg); filter: blur(0); }
  }
  @keyframes title-breathe {
    0%, 100% {
      text-shadow:
        1px 1px 0 rgba(230,159,0,0.5),
        2px 2px 0 rgba(220,20,60,0.4),
        3px 3px 0 rgba(0,35,102,0.3),
        4px 4px 0 rgba(42,1,56,0.25),
        5px 5px 0 rgba(0,0,0,0.45),
        6px 6px 0 rgba(0,0,0,0.4),
        7px 7px 0 rgba(0,0,0,0.35),
        8px 8px 0 rgba(0,0,0,0.3),
        0 0 60px rgba(220,20,60,0.35),
        0 0 120px rgba(0,35,102,0.3),
        0 0 200px rgba(255,215,0,0.12),
        0 40px 100px rgba(0,0,0,0.75);
    }
    50% {
      text-shadow:
        2px 2px 0 rgba(230,159,0,0.6),
        4px 4px 0 rgba(220,20,60,0.5),
        6px 6px 0 rgba(0,35,102,0.4),
        8px 8px 0 rgba(42,1,56,0.35),
        10px 10px 0 rgba(0,0,0,0.5),
        12px 12px 0 rgba(0,0,0,0.45),
        14px 14px 0 rgba(0,0,0,0.4),
        16px 16px 0 rgba(0,0,0,0.35),
        0 0 100px rgba(220,20,60,0.45),
        0 0 200px rgba(0,35,102,0.4),
        0 0 320px rgba(255,215,0,0.2),
        0 50px 120px rgba(0,0,0,0.85);
    }
  }
  @keyframes title-glow-pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ===== LINKS ===== */
  .links {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    align-items: center;
    position: relative;
    transform-style: preserve-3d;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.9rem;
    font-family: 'Fira Code', 'OCR-A', 'Courier New', monospace;
    font-size: 1.3rem;
    font-weight: 400;
    text-decoration: none;
    color: var(--milk);
    padding: 1rem 3.2rem;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.55);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid rgba(255, 215, 0, 0.1);
    box-shadow:
      0 6px 36px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.04),
      inset 0 -1px 0 rgba(0,0,0,0.4);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: -0.01em;
    transform-style: preserve-3d;
  }

  a::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50px;
    background: conic-gradient(from var(--border-angle, 0deg), var(--gold), var(--crimson), var(--royal), var(--tyrian), var(--gold));
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: -2;
    filter: blur(8px);
  }
  a::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: 50px;
    background: rgba(3, 1, 4, 0.9);
    z-index: -1;
    transition: background 0.5s ease;
  }

  a svg, a i {
    width: 1.15em;
    height: 1.15em;
    flex-shrink: 0;
    font-size: 1.15em;
    line-height: 1;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  }

  a:nth-child(1) { transform: rotate(-2.5deg); }
  a:nth-child(2) { transform: rotate(1.8deg); }
  a:nth-child(3) { transform: rotate(-1.4deg); }
  a:nth-child(4) { transform: rotate(2.1deg); }
  a:nth-child(5) { transform: rotate(-0.8deg); }
  a:nth-child(6) { transform: rotate(1.2deg); }

  a:hover {
    transform: scale(1.12) rotate(0deg) translateZ(40px);
    border-color: transparent;
    color: #fff;
    letter-spacing: 0.08em;
    box-shadow:
      0 0 0 1px rgba(255,215,0,0.2),
      0 16px 60px rgba(0,0,0,0.6),
      0 0 50px rgba(220,20,60,0.3),
      0 0 100px rgba(0,35,102,0.25),
      0 0 150px rgba(42,1,56,0.2),
      0 0 200px rgba(255,215,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }
  a:hover::before {
    opacity: 1;
    animation: spin-conic 4s linear infinite;
  }
  a:hover::after {
    background: rgba(10, 2, 16, 0.95);
  }
  a:hover svg, a:hover i {
    transform: scale(1.3);
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
  }

  a:active {
    transform: scale(1.05) rotate(0deg);
    box-shadow:
      0 0 0 2px rgba(255,215,0,0.35),
      0 0 80px rgba(220,20,60,0.5),
      0 0 140px rgba(0,35,102,0.4),
      inset 0 0 30px rgba(255,255,255,0.1);
  }

  @keyframes spin-conic { to { --border-angle: 360deg; } }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    h1 { font-size: clamp(3.8rem, 15vw, 7rem); margin-bottom: 3.5rem; }
    a { font-size: 1.1rem; padding: 0.9rem 2.6rem; }
    .glass-stage { inset: -40px -24px -30px; border-radius: 36px; }
    .content { padding: 1.5rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
