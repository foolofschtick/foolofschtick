<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fool of Schtick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Fira+Code:wght@400&family=Jost:wght@400;500;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #030008;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(138, 3, 3, 0.22) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 80%, rgba(102, 2, 60, 0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10, 0, 30, 0.95) 0%, #030008 100%);
    color: #e0d5c8;
    overflow-x: hidden;
    position: relative;
  }

  .noise {
    position: fixed;
    inset: 0;
    z-index: 9999;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='nf'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23nf)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 998;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 25%, rgba(3, 0, 8, 0.9) 100%);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
    animation: drift ease-in-out infinite;
    pointer-events: none;
  }

  .orb-crimson {
    width: 60vw; height: 60vw;
    background: rgba(138, 3, 3, 0.28);
    top: -20vw; left: -15vw;
    animation-duration: 22s;
  }

  .orb-purple {
    width: 55vw; height: 55vw;
    background: rgba(102, 2, 60, 0.32);
    bottom: -22vw; right: -18vw;
    animation-duration: 28s;
    animation-delay: -8s;
  }

  .orb-gold {
    width: 28vw; height: 28vw;
    background: rgba(212, 175, 55, 0.15);
    top: 30%; left: 25%;
    animation-duration: 18s;
    animation-delay: -4s;
  }

  .orb-blue {
    width: 42vw; height: 42vw;
    background: rgba(65, 105, 225, 0.18);
    bottom: 5%; left: -12%;
    animation-duration: 32s;
    animation-delay: -12s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.1); }
    66% { transform: translate(-25px, 25px) scale(0.95); }
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(35px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .monolith {
    position: relative;
    z-index: 10;
    width: 92%;
    max-width: 540px;
    padding: 3.8rem 2.5rem;
    background: rgba(6, 0, 14, 0.58);
    backdrop-filter: blur(32px) saturate(1.5);
    -webkit-backdrop-filter: blur(32px) saturate(1.5);
    border: 1px solid rgba(212, 175, 55, 0.1);
    border-radius: 2px;
    box-shadow:
      0 0 0 1px rgba(212, 175, 55, 0.03),
      0 40px 100px rgba(0, 0, 0, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.02);
    animation: reveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  .monolith::before {
    content: '';
    position: absolute;
    top: -1px; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.7), rgba(138, 3, 3, 0.5), rgba(65, 105, 225, 0.6), transparent);
  }

  h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(3.8rem, 11vw, 6.4rem);
    text-align: center;
    line-height: 0.9;
    margin-bottom: 3rem;
    background: linear-gradient(135deg, #d4af37 0%, #ff4d4d 30%, #8a0303 55%, #66023c 80%, #4169e1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 20px rgba(138, 3, 3, 0.35));
    letter-spacing: -0.02em;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    align-items: center;
  }

  a {
    display: inline-flex;
    align-items: center;
    gap: 0.9rem;
    width: 100%;
    max-width: 360px;
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    color: #b0a898;
    padding: 1.05rem 2rem;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.015);
    border: 1px solid rgba(255, 255, 255, 0.04);
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }

  a::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 2px; height: 100%;
    background: linear-gradient(180deg, #d4af37, #8a0303);
    opacity: 0.35;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }

  a svg, a i {
    width: 1.15em;
    height: 1.15em;
    flex-shrink: 0;
    font-size: 1.05em;
    color: #c0b8a8;
    transition: color 0.4s;
  }

  a:hover {
    color: #f0ebe3;
    background: rgba(212, 175, 55, 0.04);
    transform: translateX(8px);
  }

  a:hover::before {
    opacity: 1;
    width: 3px;
  }

  a:hover svg, a:hover i { color: #fff; }

  a:nth-child(1):hover { border-color: rgba(138, 3, 3, 0.4); box-shadow: -8px 0 40px rgba(138, 3, 3, 0.15); }
  a:nth-child(1)::before { background: linear-gradient(180deg, #d4af37, #8a0303); }

  a:nth-child(2):hover { border-color: rgba(102, 2, 60, 0.4); box-shadow: -8px 0 40px rgba(102, 2, 60, 0.15); }
  a:nth-child(2)::before { background: linear-gradient(180deg, #d4af37, #66023c); }

  a:nth-child(3):hover { border-color: rgba(212, 175, 55, 0.35); box-shadow: -8px 0 40px rgba(212, 175, 55, 0.12); }
  a:nth-child(3)::before { background: linear-gradient(180deg, #ffec8b, #d4af37); }

  a:nth-child(4):hover { border-color: rgba(65, 105, 225, 0.4); box-shadow: -8px 0 40px rgba(65, 105, 225, 0.15); }
  a:nth-child(4)::before { background: linear-gradient(180deg, #87cefa, #4169e1); }

  a:nth-child(5):hover { border-color: rgba(138, 3, 3, 0.4); box-shadow: -8px 0 40px rgba(138, 3, 3, 0.15); }
  a:nth-child(5)::before { background: linear-gradient(180deg, #ff6b6b, #8a0303); }

  a:nth-child(6):hover { border-color: rgba(212, 175, 55, 0.35); box-shadow: -8px 0 40px rgba(102, 2, 60, 0.15); }
  a:nth-child(6)::before { background: linear-gradient(180deg, #d4af37, #66023c); }

  @media (max-width: 600px) {
    .monolith { padding: 2.8rem 1.6rem; }
    h1 { font-size: 3.4rem; }
    a { font-size: 0.75rem; padding: 0.95rem 1.5rem; max-width: 300px; }
  }
</style>
